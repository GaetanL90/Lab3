name: lab3_travel_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.8 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  
  # Assets must be indented exactly 2 spaces under 'flutter:'
  assets:
    - assets/images/

flutter_launcher_icons:
  image_path: "assets/images/logo.jpg"
  android: true
  ios: true
  remove_alpha_ios: true